name: Build and publish FHIR IG

on:
  push:
    branches: [correction]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build IG with HL7 IG Publisher
        run: |
          docker run --rm \
            -v "$PWD":/home/publisher/ig \
            hl7fhir/ig-publisher-base:latest \
            /bin/bash -c "cd /home/publisher/ig && chmod +x _updatePublisher.sh _genonce.sh && ./_updatePublisher.sh && ./_genonce.sh"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4